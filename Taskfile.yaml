version: '3'

vars:
  NODE_VERSION: '22'

tasks:
  default:
    desc: List available tasks
    silent: true
    cmds:
      - task --list

  install:
    desc: Install npm dependencies
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/.package-lock.json
    cmds:
      - npm ci

  dev:
    desc: Dev server at http://localhost:4321/resume/
    deps: [install, export-txt, export-docx]
    cmds:
      - npm run dev

  export-txt:
    desc: Generate public/resume.txt for ATS paste/upload
    sources:
      - src/content/resume.mdx
      - scripts/parse-resume.mjs
      - scripts/export-text.mjs
    generates:
      - public/resume.txt
    cmds:
      - node scripts/export-text.mjs

  export-docx:
    desc: Generate public/resume.docx for ATS upload
    sources:
      - src/content/resume.mdx
      - scripts/parse-resume.mjs
      - scripts/export-docx.mjs
    generates:
      - public/resume.docx
    cmds:
      - node scripts/export-docx.mjs

  build:
    desc: Build static site to dist/
    deps: [install]
    sources:
      - src/**/*
      - public/**/*
      - astro.config.mjs
      - scripts/**/*
    generates:
      - dist/**/*
    cmds:
      - npm run build

  preview:
    desc: Serve the production build locally
    deps: [build]
    cmds:
      - npm run preview

  check:
    desc: Typecheck the Astro project
    deps: [install]
    cmds:
      - npm run check

  clean:
    desc: Remove build artifacts and dependencies
    cmds:
      - rm -rf dist .astro node_modules

  job-fetch:
    desc: "Fetch job posting to .job-analysis/current-posting.txt"
    cmds:
      - node scripts/fetch-job-posting.mjs "{{.URL}}"
    preconditions:
      - sh: 'test -n "{{.URL}}"'
        msg: "Set URL=... e.g. task job-fetch URL='https://...'"

  job-analyze:
    desc: "Bundle resume + job posting into .job-analysis/prompt.md for any LLM"
    deps: [export-txt]
    cmds:
      - |
        if [ -n "{{.URL}}" ]; then
          node scripts/fetch-job-posting.mjs "{{.URL}}"
        fi
      - node scripts/assemble-job-fit-prompt.mjs

  install-hooks:
    desc: Install pre-commit hook that blocks unencrypted private profile
    cmds:
      - node scripts/install-hooks.mjs

  vault-init:
    desc: Initialize encrypted private profile vault (first time)
    cmds:
      - node scripts/vault-init.mjs
      - node scripts/install-hooks.mjs

  vault-unlock:
    desc: Unlock vault with local key (~/.config/resume/git-crypt.key)
    cmds:
      - node scripts/vault-unlock.mjs

  vault-lock:
    desc: Lock vault — encrypt private files in working tree
    preconditions:
      - sh: command -v git-crypt >/dev/null
        msg: Install git-crypt first (see private/README.md)
    cmds:
      - git crypt lock

  vault-status:
    desc: Show vault initialized / locked / key file state
    cmds:
      - node scripts/vault-status.mjs

  vault-rotate:
    desc: New vault key, keep profile content (old key required)
    cmds:
      - node scripts/vault-rotate.mjs

  vault-reset:
    desc: "Destroy vault and start fresh — FORCE=1 task vault-reset"
    cmds:
      - node scripts/vault-reset.mjs
